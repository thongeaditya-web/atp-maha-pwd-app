<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#18150f">
<title>ATP's Estimate App - Fixed</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
/* ── TUMCHE ORIGINAL CSS DESIGNS (FIXED) ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0ece5;--sf:#fff;--bd:#ddd6c8;--bd2:#bfb8aa;--tx:#18150f;--mu:#7a7064; --or:#b84f09;--gr:#18602f;--rd:#9e2b2b;--bl:#1a4a76}
body{background:var(--bg);color:var(--tx);font-family:system-ui,sans-serif;font-size:13px}
nav{background:#18150f;color:#fff;padding:.5rem .9rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.nb h1{font-size:.86rem;font-weight:900}
.panel{display:none}
#loginShell, #appShell{display:none;min-height:100vh}
#loginShell{display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#18150f,#0a2018)}
.acard{background:#1c1c1c;padding:2rem;border-radius:14px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.5)}
.citem{background:#fff;padding:12px;margin-bottom:8px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.btn-sm{padding:6px 12px;border-radius:4px;border:none;cursor:pointer;font-weight:bold;margin-left:5px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;display:none;z-index:9999}
#initLoader{position:fixed;inset:0;z-index:99999;background:#f0ece5;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:40px;height:40px;border:4px solid #ccc;border-top-color:var(--or);border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>

<div id="initLoader"><div class="spin"></div><p>Loading ATP App...</p></div>

<div id="loginShell">
    <div class="acard">
        <h1 style="color:#f5a623;margin-bottom:1rem">ATP MAHA PWD</h1>
        <p style="color:#aaa;margin-bottom:2rem">SSR 2022-23 Estimation Tool</p>
        <button onclick="doGoogle()" style="padding:12px 24px;background:#4285f4;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:bold">🌐 Continue with Google</button>
    </div>
</div>

<div id="appShell">
    <nav>
        <div class="nb"><h1>ATP's Estimate App</h1></div>
        <div id="userHeaderDiv"></div>
    </nav>
    
    <div style="padding:20px; max-width:800px; margin:auto">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px">
            <h2 style="font-size:1.1rem;color:var(--bl)">Saved Estimates</h2>
            <button onclick="loadCloudList()" class="btn-sm" style="background:var(--bl);color:white">Refresh List</button>
        </div>
        
        <div id="cloudEstList" style="min-height:100px; border:1px solid var(--bd); border-radius:8px; padding:10px; background:#f9f9f9">
            <p style="color:#888">Loading your data...</p>
        </div>
        
        <div style="margin-top:20px">
            <button onclick="newEstimate()" style="width:100%;padding:15px;background:var(--or);color:white;border:none;border-radius:8px;font-weight:bold;cursor:pointer;font-size:1rem">+ Create New Estimate</button>
        </div>
    </div>
</div>

<div class="toast" id="mainToast"></div>

<script>
/* ── FIREBASE CONFIGURATION (CITATIONS: 1) ── */
var FBCFG = {
    apiKey: "AIzaSyCdH-k3hH1mYYcND0cBf7J2pLRG6xQydrU",
    authDomain: "atp-maha-pwd.firebaseapp.com",
    projectId: "atp-maha-pwd",
    storageBucket: "atp-maha-pwd.firebasestorage.app",
    messagingSenderId: "382409286731",
    appId: "1:382409286731:web:37daae9842bc3687bf99ce"
};
firebase.initializeApp(FBCFG);

var CU = null;
function G(id){ return document.getElementById(id); }

/* ── NAVIGATION & REFRESH LOGIC (FIXED) ── */
function showSection(id) {
    // Sagale panels hide karne
    G('loginShell').style.display = 'none';
    G('appShell').style.display = 'none';
    
    const el = G(id);
    if (el) {
        el.style.display = (id === 'appShell' || id === 'loginShell') ? 'flex' : 'block';
        // Jar login panel nasel, tar view save kara (Refresh fix)
        if(id !== 'loginShell') {
            localStorage.setItem('atp_last_view', id);
        }
    }
}

/* ── AUTHENTICATION ── */
window.addEventListener('load', function() {
    firebase.auth().onAuthStateChanged(function(user) {
        G('initLoader').style.display = 'none';
        if (user) {
            CU = user;
            updateUserUI();
            // REFRESH FIX: shevatche view ughadne
            var last = localStorage.getItem('atp_last_view') || 'appShell';
            showSection(last);
            loadCloudList();
        } else {
            showSection('loginShell');
        }
    });
});

function doGoogle() {
    var provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider).catch(e => showToast(e.message, "error"));
}

function updateUserUI() {
    var div = G("userHeaderDiv");
    if (div && CU) {
        div.innerHTML = `<span style="margin-right:10px; font-weight:800; color:#f5a623">${CU.displayName || CU.email}</span>
                         <button onclick="doLogout()" class="btn-sm" style="background:transparent;border:1px solid #555;color:#ccc">Logout</button>`;
    }
}

function doLogout() {
    localStorage.removeItem('atp_last_view');
    firebase.auth().signOut();
}

/* ── CLOUD ESTIMATES (FIXED BUTTONS & LIST) ── */
function loadCloudList() {
    if (!CU) return;
    var listDiv = G("cloudEstList");
    listDiv.innerHTML = "<p style='text-align:center;padding:20px'>Estimates shodhat aahe...</p>";

    firebase.firestore().collection("estimates")
        .where("uid", "==", CU.uid)
        .get().then(function(qs) {
            if (qs.empty) {
                listDiv.innerHTML = "<p style='text-align:center;padding:20px;color:#aaa'>Kontahich saved estimate nahi.</p>";
                return;
            }
            var html = "";
            qs.forEach(function(doc) {
                var d = doc.data();
                // FIXED: id string madhe taka ('${doc.id}')
                html += `<div class="citem">
                    <span class="cname">${d.name || 'Untitled Work'}</span>
                    <div>
                        <button class="btn-sm" style="background:var(--gr);color:white" onclick="openEstimate('${doc.id}')">Open</button>
                        <button class="btn-sm" style="background:var(--rd);color:white" onclick="deleteEstimate('${doc.id}')">🗑️</button>
                    </div>
                </div>`;
            });
            listDiv.innerHTML = html;
        }).catch(e => {
            listDiv.innerHTML = "<p style='color:red'>Error: " + e.message + "</p>";
        });
}

function openEstimate(id) {
    showToast("Opening Estimate...");
    // Yithe tumche editor/panel ughadnyachi logic add kara
    console.log("Loading ID:", id);
}

function deleteEstimate(id) {
    if (!confirm("Hye estimate delete karayche ka?")) return;
    firebase.firestore().collection("estimates").doc(id).delete().then(() => {
        showToast("Deleted successfully!");
        loadCloudList();
    }).catch(e => showToast("Error deleting: " + e.message, "error"));
}

/* ── NO AUTO-SAVE POPUP (FIXED) ── */
function checkAutoSave() {
    // Refresh kelyavar yenara popup thambavnyasathi ha function rikama thevla aahe
    return;
}

function newEstimate() {
    showToast("Starting New Estimate...");
    // Tumchi new estimate logic yithe yete
}

function showToast(msg, type) {
    var t = G("mainToast");
    t.textContent = msg;
    t.style.display = "block";
    t.style.background = (type === "error") ? "#9e2b2b" : "#333";
    setTimeout(() => { t.style.display = "none"; }, 3000);
}
</script>
</body>
</html>
