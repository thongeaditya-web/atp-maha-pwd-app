<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BOQ App">
<meta name="application-name" content="BOQ App">
<meta name="theme-color" content="#18150f">
<link rel="apple-touch-icon" id="pwaIcon" href="">
<link rel="manifest" id="pwaManifest" href="">
<title>Maha PWD Estimator</title>
<style>
/* मूळ सर्व स्टाईल्स कायम ठेवल्या आहेत */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0ece5;--sf:#fff;--bd:#ddd6c8;--bd2:#bfb8aa;--tx:#18150f;--mu:#7a7064;
  --or:#b84f09;--ol:#f6ede2;--gr:#18602f;--rd:#9e2b2b;--rl:#fceaea;
  --bl:#1a4a76;--bll:#e5f0f8;--pu:#4e349a}
body{background:var(--bg);color:var(--tx);font-family:system-ui,sans-serif;font-size:13px}
nav{background:#18150f;color:#fff;padding:.5rem .9rem;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.4)}
/* ... इतर CSS ... */
.cf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
.cf-field { display: flex; flex-direction: column; }
.cf-field label { font-size: 10px; color: #666; font-weight: bold; margin-bottom: 2px; }
.cf-field input { padding: 4px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div id="appShell">
  <nav>
    <div class="nb"><h1>Maha PWD Estimator</h1><p>SSR 2022-23</p></div>
    <div id="userHeaderDiv"></div>
  </nav>

  <div class="tabs">
    <div class="tab on" onclick="goTab(0)">Main</div>
    <div class="tab" onclick="goTab(3)">Abstract</div>
    </div>

  <div class="main">
    <div class="panel" id="p3">
      <div class="sh"><div class="n">3</div><h2>Abstract</h2></div>
      <div class="tw">
        <table>
          <thead>
            <tr>
              <th>Sr.</th><th>Item No.</th><th>Description</th><th>Unit</th><th class="r">Qty</th><th class="r">Rate</th><th class="r">Amount</th><th class="noprt">Action</th>
            </tr>
          </thead>
          <tbody id="boqTb">
            </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="infoModal" style="display:none;position:fixed;inset:0;z-index:9002;background:rgba(0,0,0,.7);align-items:center;justify-content:center;padding:1rem">
  <div class="icard">
    <div class="ihd"><h3 id="infoTtl">Editor</h3><button class="icls" onclick="closeInfo()">✕</button></div>
    <div id="infoIn" style="padding:1rem"></div>
    <div id="infoOut" style="display:none"></div>
  </div>
</div>

<script>
// एस्टिमेट डेटा स्टोअर (Global Object)
var EST = {
    items: [] 
};

/**
 * 1. Abstract टॅब रेंडर करताना CF बटण जोडणे
 */
function renderAbstract() {
    let html = "";
    EST.items.forEach((item, i) => {
        html += `
            <tr>
                <td>${i+1}</td>
                <td class="or">${item.no}</td>
                <td>${item.desc.substring(0, 50)}...</td>
                <td>${item.unit}</td>
                <td class="r">${item.qty}</td>
                <td class="r">₹${item.rate}</td>
                <td class="r gr">₹${(item.qty * item.rate).toFixed(2)}</td>
                <td class="noprt">
                    <button onclick="openCFEditor(${i})" class="btn-sm" style="background:#ff6f00;color:#fff;border:none;padding:2px 5px;border-radius:3px;cursor:pointer">CF</button>
                    <button class="dbt" onclick="removeItem(${i})">del</button>
                </td>
            </tr>`;
    });
    document.getElementById('boqTb').innerHTML = html;
}

/**
 * 2. CF Button Click: Editor उघडणे
 */
function openCFEditor(idx) {
    let item = EST.items[idx];
    if (!item || !item.cf) {
        alert("या आयटमसाठी Consumption Factor उपलब्ध नाही.");
        return;
    }

    let html = `
        <div style="background:#fff; border-radius:8px;">
            <p style="font-size:12px; margin-bottom:10px;">आयटम: <b>${item.no}</b> साठी प्रमाण बदला:</p>
            <div class="cf-grid">
    `;

    for (let key in item.cf) {
        html += `
            <div class="cf-field">
                <label>${key.toUpperCase()}</label>
                <input type="number" id="edit_cf_${key}" value="${item.cf[key]}" step="0.001">
            </div>`;
    }

    html += `
            </div>
            <div style="margin-top:15px; display:flex; gap:8px;">
                <button class="btn bp" onclick="saveCF(${idx})">Save Changes</button>
                <button class="btn bs" onclick="closeInfo()">Cancel</button>
            </div>
        </div>`;

    document.getElementById('infoTtl').innerText = "Consumption Factor Editor";
    document.getElementById('infoIn').innerHTML = html;
    document.getElementById('infoModal').style.display = 'flex';
}

/**
 * 3. Save CF: डेटा सेव्ह करणे
 */
function saveCF(idx) {
    let item = EST.items[idx];
    for (let key in item.cf) {
        let val = parseFloat(document.getElementById('edit_cf_' + key).value) || 0;
        item.cf[key] = val;
    }
    
    closeInfo();
    if(typeof updateAll === "function") updateAll(); // सर्व गणना पुन्हा करणे
    alert("प्रमाण (CF) यशस्वीरित्या अपडेट झाले!");
}

function closeInfo() {
    document.getElementById('infoModal').style.display = 'none';
}

function goTab(n) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
    document.getElementById('p' + n).classList.add('on');
    if(n === 3) renderAbstract();
}

// सुरुवातीला Abstract रेंडर करण्यासाठी (Test हेतु)
renderAbstract();

</script>
</body>
</html>
